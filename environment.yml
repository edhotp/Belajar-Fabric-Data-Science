# =============================================================================
# Fabric Environment YML — Tutorial Series Microsoft Fabric Data Science
# =============================================================================
# File ini bisa di-upload LANGSUNG ke Fabric Environment via:
#   Environment → External repositories → YML editor view → paste isi file ini
#
# Atau via tombol "Import from .yml" (bila tersedia di UI Fabric kamu).
#
# Format mengikuti pip dependencies spec (didukung Fabric Environment):
#   https://learn.microsoft.com/en-us/fabric/data-engineering/environment-manage-library
#
# CATATAN: hanya berisi library yang TIDAK built-in di Fabric Runtime 1.3,
# atau yang butuh pin versi spesifik untuk reproducibility tutorial.
# Library built-in (pandas, numpy, seaborn, lightgbm, pyspark, synapseml,
# requests, dll.) TIDAK perlu di-list — sudah pre-installed.
# =============================================================================
dependencies:
  - pip:
    # Modul 3 — SMOTE oversampling (TIDAK built-in)
    - imbalanced-learn==0.12.3

    # Modul 3, 4, 6 — pin agar konsisten dengan langkah tutorial
    - scikit-learn==1.6.1
    - mlflow==2.12.2

    # Modul 6 — auth Entra ID untuk REST API call ke ML Model Endpoint
    - azure-identity>=1.17.0
